<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>SP5 Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',Arial,sans-serif;
  background:#0f172a;
  overflow:hidden;
  height:100dvh;
}

/* ── HEADER ── */
.hdr{
  display:flex;
  background:#1e293b;
  border-bottom:1px solid rgba(255,255,255,0.08);
  height:50px;
}

.tab{
  flex:1;
  border:none;
  cursor:pointer;
  font-family:'Inter',Arial,sans-serif;
  font-size:14px;
  font-weight:700;
  background:transparent;
  color:#64748b;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  border-bottom:3px solid transparent;
  transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.tab:active{opacity:0.75;}

/* OT tab active */
.tab:nth-child(1).active{
  color:#38bdf8;
  border-bottom-color:#38bdf8;
  background:rgba(56,189,248,0.08);
}
/* SP5 tab active */
.tab:nth-child(2).active{
  color:#a78bfa;
  border-bottom-color:#a78bfa;
  background:rgba(167,139,250,0.08);
}

.tab-icon{font-size:17px;line-height:1;}

/* Divider between tabs */
.tab-sep{
  width:1px;
  background:rgba(255,255,255,0.08);
  align-self:stretch;
  flex-shrink:0;
}

/* ── FRAMES ── */
.fw{
  position:fixed;
  top:50px;bottom:0;left:0;right:0;
}

.frame{
  width:100%;
  height:100%;
  border:none;
  display:none;
}
.frame.active{display:block;}
</style>
</head>
<body>

<div class="hdr">
  <button class="tab active" onclick="go(0)">
    <span class="tab-icon">⚡</span>OT Dashboard
  </button>
  <div class="tab-sep"></div>
  <button class="tab" onclick="go(1)">
    <span class="tab-icon">🏭</span>SP5 Electrical
  </button>
</div>

<div class="fw">
  <iframe id="f0" class="frame active"
    src="https://poshanm.github.io/OT-dashboard_AI/"
    scrolling="yes"></iframe>
  <iframe id="f1" class="frame"
    src="https://poshanm.github.io/sp5-electrical/"
    scrolling="yes"></iframe>
</div>

<script>
const tabs   = document.querySelectorAll('.tab');
const frames = document.querySelectorAll('.frame');

function go(i) {
  tabs.forEach(t   => t.classList.remove('active'));
  frames.forEach(f => f.classList.remove('active'));
  tabs[i].classList.add('active');
  frames[i].classList.add('active');
  localStorage.setItem('sp5_tab', i);
}

// Restore last tab
const last = Number(localStorage.getItem('sp5_tab') || 0);
if (last !== 0) go(last);
</script>
</body>
</html>
