<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080d14">
<title>⚡ SP5 Electrical Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080d14;--surf:#0e1520;--border:#1e2d42;
  --text:#dce8f5;--muted:#5a7090;--accent:#3d8ef0;
  --sans:'Sora',sans-serif;
  --sw:52px;
}
/* Portal body — NO scroll, NO overflow issues */
html,body{
  height:100%;width:100%;
  font-family:var(--sans);
  background:var(--bg);
  overflow:hidden;
  /* Prevent pull-to-refresh on portal chrome */
  overscroll-behavior:none;
}

/* SWITCHER BAR */
.switcher{
  position:fixed;top:0;left:0;right:0;
  z-index:1000;height:var(--sw);
  background:var(--surf);
  border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  user-select:none;-webkit-user-select:none;
  touch-action:none; /* no scroll gestures on switcher */
}
.sw-btn{
  flex:1;display:flex;align-items:center;
  justify-content:center;gap:6px;
  font-size:15px;font-weight:700;
  color:var(--muted);
  background:none;border:none;
  border-bottom:3px solid transparent;
  font-family:var(--sans);
  transition:color .2s,border-color .2s;
  cursor:pointer;
}
.sw-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.sw-btn:active{opacity:.75;}
.sw-divider{width:1px;background:var(--border);margin:10px 0;flex-shrink:0;}

/* FRAME CONTAINER */
.frame-wrap{
  position:fixed;
  top:var(--sw);left:0;right:0;bottom:0;
}

/* 
  THE CRITICAL FIX FOR iOS iframe SCROLL:
  iframe itself must have overflow:scroll + -webkit-overflow-scrolling:touch
  This tells iOS to allow scrolling INSIDE the iframe rather than
  the portal body catching all the touch events.
*/
.frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;background:var(--bg);
  /* iOS SCROLL FIX */
  overflow:scroll;
  -webkit-overflow-scrolling:touch;
  transition:opacity .2s,transform .2s;
}
.frame.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateX(20px);
}

/* LOADER */
#loader{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:500;transition:opacity .4s;
}
#loader.done{opacity:0;pointer-events:none;}
.ld-logo{font-size:52px;}
.ld-title{font-size:22px;font-weight:700;color:var(--accent);}
.ld-sub{font-size:14px;color:var(--muted);}
.ld-bar{width:200px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px;}
.ld-fill{height:100%;width:0;background:var(--accent);border-radius:3px;transition:width .3s;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo">⚡</div>
  <div class="ld-title">SP5 Electrical</div>
  <div class="ld-sub">Loading apps...</div>
  <div class="ld-bar"><div class="ld-fill" id="ldBar"></div></div>
</div>

<!-- SWITCHER -->
<div class="switcher">
  <button class="sw-btn active" id="sw0" onclick="switchApp(0)">⚡ OT Dashboard</button>
  <div class="sw-divider"></div>
  <button class="sw-btn" id="sw1" onclick="switchApp(1)">🏭 SP5 Electrical</button>
</div>

<!-- FRAMES
     scrolling="yes" is the HTML attribute fix for older iOS
     allow="..." permits all features inside iframe
-->
<div class="frame-wrap">
  <iframe
    id="frame0"
    class="frame"
    src="https://poshanm.github.io/OT-dashboard_AI/"
    title="OT Dashboard"
    scrolling="yes"
    allow="fullscreen"
  ></iframe>
  <iframe
    id="frame1"
    class="frame hidden"
    src=""
    data-src="https://poshanm.github.io/sp5-electrical/"
    title="SP5 Electrical"
    scrolling="yes"
    allow="fullscreen"
  ></iframe>
</div>

<script>
let _active=0, _loaded=[true,false];

function switchApp(idx){
  if(idx===_active)return;
  const f=document.getElementById('frame'+idx);
  if(!_loaded[idx]){ _loaded[idx]=true; f.src=f.dataset.src; }
  document.getElementById('frame'+_active).classList.add('hidden');
  f.classList.remove('hidden');
  document.getElementById('sw'+_active).classList.remove('active');
  document.getElementById('sw'+idx).classList.add('active');
  _active=idx;
}

// Progress loader
let _p=0;
const _t=setInterval(()=>{
  _p=Math.min(_p+Math.random()*14,90);
  document.getElementById('ldBar').style.width=_p+'%';
},180);

document.getElementById('frame0').addEventListener('load',()=>{
  clearInterval(_t);
  document.getElementById('ldBar').style.width='100%';
  setTimeout(()=>document.getElementById('loader').classList.add('done'),350);
});
setTimeout(()=>document.getElementById('loader').classList.add('done'),7000);
</script>
</body>
</html>
