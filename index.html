<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080d14">
<title>⚡ SP5 Electrical Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080d14;--surf:#0e1520;--border:#1e2d42;
  --muted:#5a7090;--accent:#3d8ef0;
  --sans:'Sora',sans-serif;--sw:52px;
}
html,body{
  width:100%;height:100%;
  font-family:var(--sans);background:var(--bg);
  overflow:hidden;overscroll-behavior:none;
}

/* SWITCHER */
.sw{
  position:fixed;top:0;left:0;right:0;
  z-index:1000;height:var(--sw);
  background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
}
.sw-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:15px;font-weight:700;color:var(--muted);
  background:none;border:none;border-bottom:3px solid transparent;
  font-family:var(--sans);cursor:pointer;transition:color .2s,border-color .2s;
}
.sw-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.sw-btn:active{opacity:.75;}
.sw-div{width:1px;background:var(--border);margin:10px 0;flex-shrink:0;}

/* FRAME WRAPPER */
.fw{
  position:fixed;
  top:var(--sw);left:0;right:0;bottom:0;
  overflow:hidden;
}

/*
  iOS IFRAME SCROLL — FINAL FIX:
  
  Key insight: iOS mein iframe scroll karne ke liye 
  container div ko overflow:scroll chahiye AND
  iframe ki height container se zyada honi chahiye.
  
  Solution: iframe ko height:100% nahi, balki
  position:absolute + width/height:100% use karo
  aur container ko WebkitOverflowScrolling:touch do.
  
  Lekin asli fix: OT page khud scrollable hai (html+body pe overflow:scroll hai)
  Toh portal container ko bas overflow:scroll chahiye aur iframe full size.
*/
.fc{
  position:absolute;inset:0;
  /* 
    iOS scroll magic:
    overflow:scroll instead of auto
    -webkit-overflow-scrolling:touch
    ye do milke iOS iframe scroll enable karte hain
  */
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y pinch-zoom;
  transition:opacity .25s,transform .25s;
}
.fc.hidden{
  opacity:0;pointer-events:none;transform:translateX(15px);
}

/*
  Iframe: position absolute, full fill
  scrolling="yes" attribute bhi lagana hai (HTML attribute)
*/
.fc iframe{
  position:relative;
  width:100%;
  /* 
    HEIGHT FIX: 100% nahi, min-height use karo
    Ye ensure karta hai ki iOS ko scrollable content mile
  */
  min-height:100%;
  height:100%;
  border:none;display:block;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y pinch-zoom;
}

/* LOADER */
#ldr{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:500;transition:opacity .4s;
}
#ldr.done{opacity:0;pointer-events:none;}
.l-logo{font-size:52px;}
.l-title{font-size:22px;font-weight:700;color:var(--accent);}
.l-sub{font-size:14px;color:var(--muted);}
.l-bar{width:200px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px;}
.l-fill{height:100%;width:0;background:var(--accent);border-radius:3px;transition:width .3s;}
</style>
</head>
<body>

<div id="ldr">
  <div class="l-logo">⚡</div>
  <div class="l-title">SP5 Electrical</div>
  <div class="l-sub">Loading apps...</div>
  <div class="l-bar"><div class="l-fill" id="lFill"></div></div>
</div>

<div class="sw">
  <button class="sw-btn active" id="sw0" onclick="go(0)">⚡ OT Dashboard</button>
  <div class="sw-div"></div>
  <button class="sw-btn" id="sw1" onclick="go(1)">🏭 SP5 Electrical</button>
</div>

<div class="fw">
  <div class="fc" id="fc0">
    <iframe
      id="f0"
      src="https://poshanm.github.io/OT-dashboard_AI/"
      scrolling="yes"
      allow="fullscreen"
    ></iframe>
  </div>
  <div class="fc hidden" id="fc1">
    <iframe
      id="f1"
      src=""
      data-src="https://poshanm.github.io/sp5-electrical/"
      scrolling="yes"
      allow="fullscreen"
    ></iframe>
  </div>
</div>

<script>
let _a=0, _ld=[true,false];

function go(i){
  if(i===_a)return;
  if(!_ld[i]){
    _ld[i]=true;
    document.getElementById('f'+i).src=document.getElementById('f'+i).dataset.src;
  }
  document.getElementById('fc'+_a).classList.add('hidden');
  document.getElementById('fc'+i).classList.remove('hidden');
  document.getElementById('sw'+_a).classList.remove('active');
  document.getElementById('sw'+i).classList.add('active');
  _a=i;
}

// Loader
let _p=0;
const _t=setInterval(()=>{
  _p=Math.min(_p+Math.random()*14,90);
  document.getElementById('lFill').style.width=_p+'%';
},180);
document.getElementById('f0').addEventListener('load',()=>{
  clearInterval(_t);
  document.getElementById('lFill').style.width='100%';
  setTimeout(()=>document.getElementById('ldr').classList.add('done'),350);
});
setTimeout(()=>document.getElementById('ldr').classList.add('done'),7000);
</script>
</body>
</html>
