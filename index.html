<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>SP5 Electrical Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --hdr: 58px;
  --bg: #0f172a;
  --hdr-bg: #0f172a;
  --border: rgba(255,255,255,0.08);
  --tab-idle: rgba(255,255,255,0.06);
  --tab-hover: rgba(255,255,255,0.1);
  --ot-color: #38bdf8;
  --ot-bg: rgba(56,189,248,0.15);
  --ot-border: rgba(56,189,248,0.35);
  --sp5-color: #a78bfa;
  --sp5-bg: rgba(167,139,250,0.15);
  --sp5-border: rgba(167,139,250,0.35);
  --text: #f1f5f9;
  --muted: #64748b;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  overflow: hidden;
  height: 100dvh;
  width: 100%;
}

/* ── HEADER ── */
.hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--hdr);
  background: var(--hdr-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  z-index: 1000;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* Plant logo / title */
.hdr-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 6px;
  flex-shrink: 0;
}
.hdr-logo {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #38bdf8, #a78bfa);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.hdr-plant {
  line-height: 1.2;
}
.hdr-plant-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}
.hdr-plant-sub {
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
}

/* Divider */
.hdr-sep {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* Tab buttons */
.tabs {
  display: flex;
  gap: 6px;
  flex: 1;
}

.tab-btn {
  flex: 1;
  height: 38px;
  border: 1px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  background: var(--tab-idle);
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
}
.tab-btn:active { transform: scale(0.96); }
.tab-btn:hover  { background: var(--tab-hover); }

/* OT active */
.tab-btn[data-app="ot"].active {
  background: var(--ot-bg);
  border-color: var(--ot-border);
  color: var(--ot-color);
}
/* SP5 active */
.tab-btn[data-app="sp5"].active {
  background: var(--sp5-bg);
  border-color: var(--sp5-border);
  color: var(--sp5-color);
}

.tab-icon { font-size: 16px; line-height: 1; }

/* Loading dot on inactive tab */
.tab-badge {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.6;
  display: none;
}
.tab-btn.loaded .tab-badge { display: block; }

/* ── FRAME AREA ── */
.frame-wrap {
  position: fixed;
  top: var(--hdr);
  bottom: 0; left: 0; right: 0;
}

.frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #0f172a;
}
.frame.active { display: block; }

/* ── SPLASH / LOADER ── */
#splash {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 2000;
  transition: opacity 0.5s;
}
#splash.done { opacity: 0; pointer-events: none; }

.splash-logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 100%);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  box-shadow: 0 0 40px rgba(56,189,248,0.3);
  animation: logoPulse 1.6s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 30px rgba(56,189,248,0.3); }
  50%      { box-shadow: 0 0 60px rgba(167,139,250,0.5); }
}

.splash-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}
.splash-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: -14px;
}
.splash-bar {
  width: 180px; height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.splash-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  border-radius: 3px;
  transition: width 0.25s ease;
}
.splash-msg {
  font-size: 12px;
  color: var(--muted);
  margin-top: -12px;
}

/* ── ONLINE/OFFLINE INDICATOR ── */
#net-bar {
  display: none;
  position: fixed;
  top: var(--hdr);
  left: 0; right: 0;
  background: #7f1d1d;
  border-bottom: 1px solid #991b1b;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: #fca5a5;
  padding: 5px;
  z-index: 999;
}
#net-bar.show { display: block; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">⚡</div>
  <div class="splash-title">SP5 Electrical</div>
  <div class="splash-sub">Screening Plant · Electrical Dept</div>
  <div class="splash-bar"><div class="splash-fill" id="splashFill"></div></div>
  <div class="splash-msg" id="splashMsg">Loading apps...</div>
</div>

<!-- OFFLINE BAR -->
<div id="net-bar">📡 Offline — Last cached data shown</div>

<!-- HEADER -->
<div class="hdr">

  <!-- Brand -->
  <div class="hdr-brand">
    <div class="hdr-logo">⚡</div>
    <div class="hdr-plant">
      <div class="hdr-plant-name">SP5 Portal</div>
      <div class="hdr-plant-sub">Electrical Dept</div>
    </div>
  </div>

  <div class="hdr-sep"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-app="ot" onclick="go(0)">
      <span class="tab-icon">⚡</span>
      <span>OT Dashboard</span>
      <span class="tab-badge"></span>
    </button>
    <button class="tab-btn" data-app="sp5" onclick="go(1)">
      <span class="tab-icon">🏭</span>
      <span>SP5 Electrical</span>
      <span class="tab-badge"></span>
    </button>
  </div>

</div>

<!-- FRAMES -->
<div class="frame-wrap">
  <iframe
    id="f0"
    class="frame"
    src="https://poshanm.github.io/OT-dashboard_AI/"
    scrolling="yes"
    allow="fullscreen"
  ></iframe>
  <iframe
    id="f1"
    class="frame"
    data-src="https://poshanm.github.io/sp5-electrical/"
    scrolling="yes"
    allow="fullscreen"
  ></iframe>
</div>

<script>
// ── STATE ──
let lastTab = Number(localStorage.getItem('sp5_tab') || 0);
let loaded  = [true, false];
let btns, frames;

// ── SWITCH ──
function go(i) {
  frames.forEach(f => f.classList.remove('active'));
  btns.forEach(b => b.classList.remove('active'));

  // Lazy load
  if (!loaded[i]) {
    frames[i].src = frames[i].dataset.src;
    loaded[i] = true;
    frames[i].addEventListener('load', () => {
      btns[i].classList.add('loaded');
    }, { once: true });
  }

  frames[i].classList.add('active');
  btns[i].classList.add('active');
  localStorage.setItem('sp5_tab', i);
}

// ── SPLASH ──
const fill = document.getElementById('splashFill');
const msg  = document.getElementById('splashMsg');
let pct = 0;
const msgs = [
  [0,  'Loading apps...'],
  [35, 'Connecting to servers...'],
  [65, 'Preparing interface...'],
  [88, 'Almost ready...'],
];
const ticker = setInterval(() => {
  pct = Math.min(pct + (pct < 70 ? 2.5 : 0.6), 95);
  fill.style.width = pct + '%';
  const m = msgs.slice().reverse().find(([p]) => pct >= p);
  if (m) msg.textContent = m[1];
}, 80);

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  btns   = document.querySelectorAll('.tab-btn');
  frames = document.querySelectorAll('.frame');

  go(lastTab);

  // Mark first frame as loaded when ready
  btns[0].classList.add('loaded');

  // Hide splash when first iframe loads
  document.getElementById('f0').addEventListener('load', () => {
    clearInterval(ticker);
    fill.style.width = '100%';
    msg.textContent  = 'Ready!';
    setTimeout(() => {
      document.getElementById('splash').classList.add('done');
      setTimeout(() => document.getElementById('splash').remove(), 500);
    }, 300);
  }, { once: true });

  // Fallback splash hide
  setTimeout(() => {
    const sp = document.getElementById('splash');
    if (sp) { sp.classList.add('done'); setTimeout(() => sp.remove(), 500); }
  }, 7000);
});

// ── OFFLINE DETECTION ──
const netBar = document.getElementById('net-bar');
window.addEventListener('online',  () => netBar.classList.remove('show'));
window.addEventListener('offline', () => netBar.classList.add('show'));
if (!navigator.onLine) netBar.classList.add('show');

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
